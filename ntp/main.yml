---
- name: Configure Time Synchronization (NTP)
  hosts: all
  become: true

  vars:
    ntp_servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

  tasks:

  # Detect if ntp is supported

  - name: Set time service fact
    set_fact:
      ntp_supported: >-
        {% if ansible_distribution == "Fedora" and ansible_distribution_major_version | int >= 16 %}
        false
        {% elif ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 8 %}
        false
        {% elif ansible_os_family == "Debian" and ansible_distribution_major_version | int >= 10 %}
        false
        {% else %}
        true
        {% endif %}

  - name: Fail if ntp is not supported
    fail:
      msg: >
        The legacy 'ntp' service is not supported on
        {{ ansible_distribution }} {{ ansible_distribution_version }}.
        Please use chrony instead.
    when: not ntp_supported | bool

  # Install required package

  - name: Install ntp
    package:
      name: ntp
      state: present
    when: time_service == "ntp"

  # Stop and disable conflicting service

  - name: Stop chrony if switching to ntp
    systemd:
      name: chronyd
      state: stopped
      enabled: false
    ignore_errors: true

  # Configure ntp

  - name: Configure ntp servers
    blockinfile:
      path: /etc/ntp.conf
      marker: "# {mark} ANSIBLE MANAGED BLOCK"
      block: |
        {% for server in ntp_servers %}
        server {{ server }} iburst
        {% endfor %}
    notify: restart time service

  # Enable and start ntp service

  - name: Enable and start ntp
    systemd:
      name: ntpd
      enabled: true
      state: started

  # Verify synchronization

  - name: Check ntp peers
    command: ntpq -p
    register: ntp_status
    changed_when: false

  - name: Show ntp status
    debug:
      var: ntp_status.stdout_lines

  # Handlers

  handlers:
    - name: restart time service
      systemd:
        name: ntpd
        state: restarted