---
- name: Configure Time Synchronization (Chrony or NTP)
  hosts: all
  become: true

  vars:
    ntp_servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

  tasks:

  # Detect which service should be used

  - name: Set time service fact
    set_fact:
      time_service: >-
        {% if ansible_distribution == "Fedora" %}
        chrony
        {% elif ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 8 %}
          chrony
        {% elif ansible_os_family == "Debian" and ansible_distribution_major_version | int >= 10 %}
          chrony
        {% else %}
          ntp
        {% endif %}

  - name: Debug chosen service
    debug:
      msg: "System will use {{ time_service }}"

  # Install required package

  - name: Install chrony
    package:
      name: chrony
      state: present
    when: time_service == "chrony"

  - name: Install ntp
    package:
      name: ntp
      state: present
    when: time_service == "ntp"

  # Stop and disable conflicting service

  - name: Stop ntp if switching to chrony
    systemd:
      name: ntpd
      state: stopped
      enabled: false
    ignore_errors: true
    when: time_service == "chrony"

  - name: Stop chrony if switching to ntp
    systemd:
      name: chronyd
      state: stopped
      enabled: false
    ignore_errors: true
    when: time_service == "ntp"

  # Configure chrony

  - name: Configure chrony servers
    blockinfile:
      path: /etc/chrony.conf
      marker: "# {mark} ANSIBLE MANAGED BLOCK"
      block: |
        {% for server in ntp_servers %}
        server {{ server }} iburst
        {% endfor %}
    when: time_service == "chrony"
    notify: restart time service

  # Configure ntp

  - name: Configure ntp servers
    blockinfile:
      path: /etc/ntp.conf
      marker: "# {mark} ANSIBLE MANAGED BLOCK"
      block: |
        {% for server in ntp_servers %}
        server {{ server }} iburst
        {% endfor %}
    when: time_service == "ntp"
    notify: restart time service

  # Enable and start correct service

  - name: Enable and start chrony
    systemd:
      name: chronyd
      enabled: true
      state: started
    when: time_service == "chrony"

  - name: Enable and start ntp
    systemd:
      name: ntpd
      enabled: true
      state: started
    when: time_service == "ntp"

  # Verify synchronization

  - name: Check chrony sources
    command: chronyc sources
    register: chrony_status
    changed_when: false
    when: time_service == "chrony"

  - name: Show chrony status
    debug:
      var: chrony_status.stdout_lines
    when: time_service == "chrony"

  - name: Check ntp peers
    command: ntpq -p
    register: ntp_status
    changed_when: false
    when: time_service == "ntp"

  - name: Show ntp status
    debug:
      var: ntp_status.stdout_lines
    when: time_service == "ntp"

  # Handlers

  handlers:
    - name: restart time service
      systemd:
        name: "{{ 'chronyd' if time_service == 'chrony' else 'ntpd' }}"
        state: restarted